<!DOCTYPE html>
<html lang="ru">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Регистрация — Ecosystem of self-creation</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
	<link rel="stylesheet" href="style.css">
</head>
<body>
	<main>
		<form action="" method="post">

			<!-- Шапка с брендом -->
			<div class="brand">
				<img src="Architect_Logo.png" alt="Architect logo" class="logo" width="56" height="56">
				<p class="brand-tagline">Ecosystem of self-creation</p>
			</div>

			<!-- Форма регистрации -->
			<fieldset>
				<legend class="title">Регистрация</legend>
				<div class="form-group">
					<label for="email">Почта</label>
					<input type="email" placeholder="example@mail.ru" id="email" name="email" required inputmode="email" autocomplete="email" aria-describedby="email-error">
					<span id="email-error" role="alert"></span>
				</div>
				<div class="form-group">
					<label for="password">Пароль</label>
					<input type="password" placeholder="Минимум 8 символов" id="password" name="password" minlength="8" required autocomplete="new-password">
				</div>
				<div class="form-group">
					<label for="repeat_password">Повторите пароль</label>
					<input type="password" placeholder="Повторите пароль" id="repeat_password" name="repeat_password" required autocomplete="new-password">
				</div>
				<div class="form-group">
					<button type="submit">Отправить</button>
				</div>
				<div>
					<p class="login-link">Уже есть аккаунт? <a href="login.html">Войти</a></p>
				</div>
			</fieldset>
		</form>
	</main>
</body>
</html>
